{% extends 'admin_base.html' %}
{% block title %}Update Land Owner{% endblock %}

{% block content %}
<div class="form-container glass">
    <h2 style="margin-bottom: 0.5rem;">Update Land Owner</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Transfer land ownership by filling the details below.</p>

    <form method="POST" action="{{ url_for('update_owner') }}">
        <div class="form-group">
            <label>Land ID</label>
            <input type="text" name="land_id" class="form-control" placeholder="e.g., LND-425" required>
        </div>

        <div class="form-group">
            <label>New Owner Name</label>
            <input type="text" name="owner" class="form-control" placeholder="e.g., John Doe" required>
        </div>

        <div class="form-group">
            <label>Survey Number</label>
            <input type="text" name="survey_number" class="form-control" placeholder="e.g., SN123" required>
        </div>
        
        <div class="form-group">
            <label>State</label>
            <input type="text" name="state" class="form-control" placeholder="e.g., TamilNadu" required>
        </div>

        <div class="form-group">
            <label>District</label>
            <input type="text" name="district" class="form-control" placeholder="e.g., Chennai" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" id="address" class="form-control" placeholder="e.g., 123 Main St, Chennai" required>
        </div>

        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label>Latitude</label>
                <input type="text" name="latitude" id="latitude" class="form-control" placeholder="Auto-filled" readonly>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Longitude</label>
                <input type="text" name="longitude" id="longitude" class="form-control" placeholder="Auto-filled" readonly>
            </div>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="text" name="owner_phone" class="form-control" placeholder="e.g., 9876543210" required>
        </div>

        <script>
            const addressInput = document.getElementById('address');
            const latInput = document.getElementById('latitude');
            const lonInput = document.getElementById('longitude');

            let timeout = null;
            addressInput.addEventListener('input', function() {
                clearTimeout(timeout);
                const address = this.value;
                if (address.length < 5) return;

                timeout = setTimeout(() => {
                    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`)
                        .then(response => response.json())
                        .then(data => {
                            if (data && data.length > 0) {
                                latInput.value = data[0].lat;
                                lonInput.value = data[0].lon;
                                latInput.style.borderColor = "#2ecc71";
                                lonInput.style.borderColor = "#2ecc71";
                            }
                        })
                        .catch(err => console.error("Geocoding error:", err));
                }, 1000); // Wait 1s after typing stops
            });
        </script>

        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Update Ownership</button>
    </form>
</div>
{% endblock %}
