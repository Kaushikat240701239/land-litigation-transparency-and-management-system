<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ error_code }} - LandLitix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="glass" style="max-width: 600px; padding: 4rem 2rem;">
        <div style="font-size: 5rem; font-weight: 900; color: var(--danger); margin-bottom: 1rem;">{{ error_code }}</div>
        <h1 style="margin-bottom: 1.5rem;">System Interruption</h1>
        <p style="color: var(--text-muted); font-size: 1.2rem; margin-bottom: 3rem; line-height: 1.6;">{{ error_message }}</p>
        
        <a href="{{ url_for('welcome') }}" class="btn btn-primary" style="padding: 1rem 3rem; width: auto; font-size: 1.1rem;">
            Return to Safety
        </a>
    </div>
</body>
</html>
