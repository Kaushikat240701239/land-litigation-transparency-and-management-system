{% extends 'admin_base.html' %}
{% block title %}Add New Case{% endblock %}

{% block content %}
<div class="form-container glass">
    <h2 style="margin-bottom: 0.5rem;">Create New Case</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Fill out the properties below to append a judicial case to a land record.</p>

    <form method="POST" action="{{ url_for('add_case') }}">
        <div class="form-group">
            <label>Land ID</label>
            <input type="text" name="land_id" class="form-control" placeholder="e.g., LND-425" required>
        </div>

        <div class="form-group">
            <label>Case Status</label>
            <select name="case_status" class="form-control" required style="appearance: none; background: rgba(15, 23, 42, 0.8);">
                <option value="Ongoing">Ongoing</option>
                <option value="Pending">Pending</option>
                <option value="Closed">Closed</option>
            </select>
        </div>

        <div class="form-group">
            <label>Court Name (Optional)</label>
            <input type="text" name="court_name" class="form-control" placeholder="e.g., High Court of Justice">
        </div>

        <div class="form-group">
            <label>Case Description</label>
            <textarea name="case_description" class="form-control" rows="4" placeholder="Brief details about the litigation..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">File Case Report</button>
    </form>
</div>
{% endblock %}
